services:
  postgres:
    image: postgres:16-alpine
    container_name: life-video-postgres
    environment:
      POSTGRES_USER: lifevideo
      POSTGRES_PASSWORD: lifevideo
      POSTGRES_DB: life_video_mvp
    ports:
      - "5433:5432"
    volumes:
      - life_video_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: life-video-redis
    ports:
      - "6380:6379"
    volumes:
      - life_video_redis_data:/data

volumes:
  life_video_pg_data:
  life_video_redis_data:
